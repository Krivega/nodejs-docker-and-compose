services:
  frontend:
    container_name: frontend
    build:
      context: ./frontend
    ports:
      - "8081:80"
    networks:
      - public-network
    restart: unless-stopped

  backend:
    container_name: backend
    build:
      context: ./backend
    ports:
      - "4000:3000"
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=database
    depends_on:
      database:
        condition: service_healthy
    networks:
      - public-network
      - db-network
    restart: unless-stopped

  database:
    container_name: database
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - db-network
    restart: unless-stopped

volumes:
  db-data:

networks:
  public-network:
    driver: bridge
  db-network:
    driver: bridge
    internal: true
